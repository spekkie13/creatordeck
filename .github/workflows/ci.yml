name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: postgresql://user:password@localhost/db
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: dummy
          TWITCH_CLIENT_ID: dummy
          TWITCH_CLIENT_SECRET: dummy
          TWITCH_WEBHOOK_SECRET: dummy
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          SPOTIFY_CLIENT_ID: dummy
          SPOTIFY_CLIENT_SECRET: dummy
          CRON_SECRET: dummy
          LEMONSQUEEZY_API_KEY: dummy
          LEMONSQUEEZY_WEBHOOK_SECRET: dummy
          LEMONSQUEEZY_STORE_ID: dummy
          LEMONSQUEEZY_VARIANT_TIER1_MONTHLY: dummy
          LEMONSQUEEZY_VARIANT_TIER1_ANNUAL: dummy
          LEMONSQUEEZY_VARIANT_TIER2_MONTHLY: dummy
          LEMONSQUEEZY_VARIANT_TIER2_ANNUAL: dummy
          LEMONSQUEEZY_VARIANT_TIER3_MONTHLY: dummy
          LEMONSQUEEZY_VARIANT_TIER3_ANNUAL: dummy
